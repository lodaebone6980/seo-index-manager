<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #1e293b;
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .engine-tabs {
      display: flex; gap: 4px; padding: 8px 16px;
      background: #1e293b; border-bottom: 1px solid #334155;
    }
    .engine-tab {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #334155;
      background: transparent; color: #94a3b8; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: all 0.2s;
    }
    .engine-tab:hover { border-color: #3b82f6; color: #fff; }
    .engine-tab.active { background: #1e3a5f; border-color: #3b82f6; color: #fff; }
    .engine-tab.naver.active { background: #052e16; border-color: #03C75A; }
    .engine-tab.daum.active { background: #422006; border-color: #FFCD00; }

    .control-bar {
      padding: 8px 16px; background: #0f172a;
      border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; gap: 8px;
    }
    .control-bar select {
      flex: 1; background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 12px;
    }
    .btn {
      padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: all 0.2s;
    }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-green:hover { background: #16a34a; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-red:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-bar {
      padding: 8px 16px; background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 12px; display: none;
    }
    .status-bar.show { display: block; }
    .status-bar .count { color: #22c55e; font-weight: 700; }
    .status-bar .current-url {
      color: #60a5fa; font-size: 11px; word-break: break-all;
      margin-top: 4px; display: block;
    }
    .status-bar .status-msg { color: #94a3b8; }

    .queue-list {
      flex: 1; overflow-y: auto; padding: 8px 16px;
    }
    .queue-item {
      padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
      font-size: 11px; word-break: break-all;
      background: #1e293b; border: 1px solid #334155;
      display: flex; align-items: center; gap: 8px;
    }
    .queue-item.done { opacity: 0.5; border-color: #166534; }
    .queue-item.active { border-color: #3b82f6; background: #1e3a5f; }
    .queue-item.failed { border-color: #7f1d1d; }
    .queue-item .icon { font-size: 14px; flex-shrink: 0; }
    .queue-item .url { flex: 1; color: #cbd5e1; }

    .login-notice {
      padding: 16px; text-align: center; color: #94a3b8;
      font-size: 12px; line-height: 1.6;
    }
    .login-notice a {
      color: #60a5fa; text-decoration: none;
    }
    .login-notice a:hover { text-decoration: underline; }

    .empty-state {
      padding: 40px 16px; text-align: center; color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>색인 요청 패널</h1>
    <span id="processedTotal" style="color:#22c55e; font-weight:700; font-size:14px;">0</span>
  </div>

  <div class="engine-tabs">
    <button class="engine-tab naver" data-engine="naver">네이버</button>
    <button class="engine-tab daum" data-engine="daum">다음</button>
  </div>

  <div class="control-bar">
    <select id="siteSelect">
      <option value="">사이트 선택...</option>
    </select>
    <button class="btn btn-green" id="btnStart">시작</button>
    <button class="btn btn-red" id="btnStop" style="display:none;">중지</button>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-msg" id="statusMsg">준비 중...</span>
    <span class="count" id="statusCount">0</span>건 완료
    <span class="current-url" id="currentUrl"></span>
  </div>

  <div class="login-notice" id="loginNotice">
    <p>네이버 또는 다음 엔진을 선택하세요.</p>
    <p style="margin-top:8px;">색인 요청 전에 해당 웹마스터 도구에<br>먼저 로그인해야 합니다.</p>
    <p style="margin-top:12px;">
      <a href="#" id="linkNaver">네이버 서치어드바이저 로그인</a><br>
      <a href="#" id="linkDaum" style="margin-top:4px;display:inline-block;">다음 웹마스터도구 로그인</a>
    </p>
  </div>

  <div class="queue-list" id="queueList">
    <div class="empty-state">사이트를 선택하고 시작 버튼을 누르세요.</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
