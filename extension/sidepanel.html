<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0; font-size: 13px;
      min-height: 100vh;
    }
    .header {
      background: #1e293b; padding: 14px 16px;
      border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .dot.unknown { background: #64748b; }

    .section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .section-title {
      font-size: 11px; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title .toggle { font-size: 10px; color: #475569; }
    .collapsible { overflow: hidden; transition: max-height 0.3s; }
    .collapsed .collapsible { max-height: 0 !important; }

    .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .config-row label { color: #94a3b8; font-size: 12px; min-width: 60px; }
    .config-row input, select {
      flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px;
      padding: 7px 10px; color: #fff; font-size: 12px; outline: none; width: 100%;
    }
    .config-row input:focus, select:focus { border-color: #3b82f6; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: all 0.2s; width: 100%;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 11px; width: auto; }

    .engine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .engine-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; cursor: pointer; transition: all 0.2s;
    }
    .engine-btn:hover { border-color: #3b82f6; }
    .engine-btn.active { border-color: #3b82f6; background: #1e3a5f; }
    .engine-btn .name { color: #fff; font-weight: 600; font-size: 12px; }
    .engine-btn .dot-e { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .status-box {
      background: #1e293b; border-radius: 8px; padding: 12px;
      border: 1px solid #334155; margin-top: 8px; display: none;
    }
    .status-box.show { display: block; }
    .status-text { color: #94a3b8; font-size: 12px; }
    .status-url { color: #60a5fa; font-size: 11px; word-break: break-all; margin-top: 4px; }
    .status-count { color: #22c55e; font-weight: 700; font-size: 18px; }

    .link { color: #60a5fa; text-decoration: none; font-size: 12px; }
    .link:hover { text-decoration: underline; }
    .msg { padding: 6px 10px; border-radius: 6px; font-size: 11px; margin-top: 6px; }
    .msg.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .msg.error { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="dot unknown" id="connectionDot"></span>
      <h1>SEO 색인 관리자</h1>
    </div>
    <span class="status-count" id="totalCount">0</span>
  </div>

  <!-- 서버 설정 (접기 가능) -->
  <div class="section" id="configSection">
    <div class="section-title" onclick="toggleSection('configSection')">
      서버 설정 <span class="toggle">▼</span>
    </div>
    <div class="collapsible" style="max-height:300px;">
      <div class="config-row">
        <label>서버</label>
        <input type="text" id="serverUrl" placeholder="https://web-production-b7ac2.up.railway.app">
      </div>
      <div class="config-row">
        <label>Google</label>
        <input type="password" id="googleApiKey" placeholder="Google Indexing API Key">
      </div>
      <div class="config-row">
        <label>Bing</label>
        <input type="password" id="bingApiKey" placeholder="Bing Webmaster API Key">
      </div>
      <div class="btn-row">
        <button class="btn btn-sm btn-primary" id="btnTest">연결 테스트</button>
        <button class="btn btn-sm btn-primary" id="btnSave">설정 저장</button>
      </div>
      <div id="configMsg"></div>
    </div>
  </div>

  <!-- 사이트 선택 -->
  <div class="section">
    <div class="section-title">사이트 선택</div>
    <select id="siteSelect">
      <option value="">사이트를 선택하세요...</option>
    </select>
  </div>

  <!-- 엔진 선택 -->
  <div class="section">
    <div class="section-title">색인 엔진</div>
    <div class="engine-grid">
      <div class="engine-btn" data-engine="google">
        <span class="dot-e" style="background:#4285F4"></span>
        <span class="name">Google</span>
      </div>
      <div class="engine-btn" data-engine="bing">
        <span class="dot-e" style="background:#00809D"></span>
        <span class="name">Bing</span>
      </div>
      <div class="engine-btn" data-engine="naver">
        <span class="dot-e" style="background:#03C75A"></span>
        <span class="name">Naver</span>
      </div>
      <div class="engine-btn" data-engine="daum">
        <span class="dot-e" style="background:#FFCD00"></span>
        <span class="name">Daum</span>
      </div>
    </div>
  </div>

  <!-- 실행 -->
  <div class="section">
    <button class="btn btn-primary" id="btnStart">색인 요청 시작</button>
    <button class="btn btn-danger" id="btnStop" style="display:none;">중지</button>
    <div class="status-box" id="statusBox">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="status-text" id="statusText">대기 중</span>
        <span class="status-count" id="statusCount">0</span>
      </div>
      <div class="status-url" id="statusUrl"></div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div class="section" style="text-align:center;border:none;">
    <a class="link" id="dashboardLink">대시보드 열기</a>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
